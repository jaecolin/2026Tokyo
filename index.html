<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京家族旅遊全能手冊V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInBottom {
            from { transform: translateY(32px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animation-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .animation-slide-in-bottom {
            animation: slideInBottom 0.5s ease-out forwards;
        }

        .custom-marker {
            background: transparent;
            border: none;
        }
        .pin {
            width: 36px;
            height: 36px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -18px 0 0 -18px;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }
        .pin-spot { background: #2C4F3E; }
        .pin-food { background: #C8A165; }
        .pin-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body class="bg-[#F9F7F2] text-[#2C4F3E] pb-32 min-h-screen">

    <header class="bg-[#2C4F3E] text-white px-6 py-10 rounded-b-[40px] shadow-2xl sticky top-0 z-50">
        <h1 class="text-4xl font-black tracking-tight flex items-center gap-3">
            TOKYO 2026 <i data-lucide="plane" class="w-8 h-8 rotate-45 text-[#C8A165]"></i>
        </h1>
        <p class="text-base text-[#C8A165] font-black mt-2 uppercase tracking-widest">Luxury Family Guide V7.0</p>
    </header>

    <div class="flex overflow-x-auto gap-4 p-6 scrollbar-hide sticky top-[100px] bg-[#F9F7F2]/90 backdrop-blur-md z-40" id="nav-container">
    </div>

    <main class="px-6 max-w-lg mx-auto" id="main-content">
    </main>

    <div id="modal-container" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6 bg-slate-900/70 backdrop-blur-md animation-fade-in">
    </div>

    <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white/95 backdrop-blur-xl border border-gray-200 p-5 rounded-[32px] shadow-2xl flex justify-between items-center z-40">
        <div class="flex gap-4 items-center">
            <div class="bg-[#F9F7F2] p-3 rounded-2xl">
                <i data-lucide="heart" class="w-7 h-7 text-[#C8A165] fill-[#C8A165]" id="status-icon"></i>
            </div>
            <div>
                <p class="text-sm font-black text-gray-400 uppercase leading-none" id="status-time">Family Status</p>
                <p class="text-lg font-black text-[#2C4F3E] leading-none mt-2" id="status-text">載入中...</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="bg-gray-100 text-gray-500 p-4 rounded-2xl active:bg-gray-200">
                <i data-lucide="arrow-up" class="w-6 h-6"></i>
            </button>
        </div>
    </footer>

    <script>
        const itineraryData = [
            {
                date: "6/03 (三)", title: "抵達與接風之夜", summary: "班機抵達搭乘包車，享用高級日式晚餐",

                    { time: "14:30", loc: "成田機場", title: "包車前往希爾頓", detail: "九人座專車直達飯店門口。車程約七十分鐘，長輩可於車上休息。", trans: "包車", lat: 35.7719, lng: 140.3928 },
                    { time: "16:30", loc: "希爾頓飯店", title: "辦理入住與休息", detail: "辦理入住並領取假期套票包，稍作梳洗。", trans: "步行", lat: 35.6279, lng: 139.8744 },
                    { time: "18:00", loc: "大倉飯店", title: "日式會席晚餐", detail: "步行三分鐘即達，避開自助餐人潮。極致安靜與服務，精緻日式會席料理或壽司非常適合為長輩接風。", trans: "步行", lat: 35.6262, lng: 139.8727 }
                ],

                ],

                    { time: "17:00", loc: "淺草雷門", title: "淺草寺參拜", detail: "傍晚氣候涼爽散步，晚餐享用淺草今半壽喜燒。", trans: "步行", lat: 35.7147, lng: 139.7966 }

                    { time: "11:30", loc: "築地市場", title: "壽司午餐", detail: "預約制餐廳，長輩不需站立排隊即可享用美食。", trans: "計程車", lat: 35.6655, lng: 139.7707 },
                    { time: "14:30", loc: "墨田水族館", title: "室內水族館", detail: "冷氣充足，全室內行程，適合祖孫同樂。", trans: "電梯", lat: 35.7100, lng: 139.8107 },
                    { time: "17:30", loc: "晴空塔", title: "展望台夕陽", detail: "預約登塔欣賞日落美景，對長輩小孩負擔最小。", trans: "電梯", lat: 35.7100, lng: 139.8107 }

                    { name: "築地預約餐廳", desc: "預先安排的精緻壽司，免去排隊辛勞", lat: 35.6650, lng: 139.7700 }

                    { time: "11:00", loc: "合羽橋道具街", title: "街區散步", detail: "於道具街或隅田川畔輕鬆漫步，享受最後的東京早晨。", trans: "步行", lat: 35.7144, lng: 139.7885 },

                ],
                restaurants: []

        let currentActiveTab = 'overview';
        let mapInstance = null;

        function renderNav() {
            const tabs = [
                { id: 'overview', label: '行程總覽' },
                { id: 'map', label: '地圖總覽' },
                { id: 'disney-move-guide', label: '園區移動策略' },
                { id: 'disney-guide', label: '迪士尼指南' },
                { id: 'tour-guide', label: '導覽指南' },
                { id: 'shopping-guide', label: '採購指南' },
                { id: 'pre-check', label: '行前清單' },
                { id: 'return-check', label: '回程清單' }
            ];

            const navHtml = tabs.map(tab => {
                const isActive = currentActiveTab === tab.id || (tab.id === 'overview' && currentActiveTab.startsWith('day-'));
                const activeClasses = isActive 
                    ? `bg-[#2C4F3E] text-white shadow-lg` 
                    : `bg-white text-gray-500 border border-gray-200`;
                
                return `<button onclick="setActiveTab('${tab.id}')" class="shrink-0 px-6 py-4 rounded-2xl whitespace-nowrap text-base font-black tracking-widest transition-all ${activeClasses}">${tab.label}</button>`;
            }).join('');

            document.getElementById('nav-container').innerHTML = navHtml;
        }

        function renderContent() {
            const mainContent = document.getElementById('main-content');
            let html = '';

            if (mapInstance) {
                mapInstance.remove();
                mapInstance = null;
            }

            if (currentActiveTab === 'overview') {
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <h2 class="text-3xl font-bold text-[#2C4F3E] px-2 mb-6">每日行程列表</h2>
                        ${itineraryData.map((day, idx) => `
                            <div onclick="setActiveTab('day-${idx}')" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200 flex items-center justify-between hover:border-[#C8A165] transition-all cursor-pointer">
                                <div class="flex gap-6 items-center">
                                    <div class="bg-[#F9F7F2] text-[#C8A165] w-20 h-20 rounded-2xl flex flex-col items-center justify-center font-bold">
                                        <span class="text-sm uppercase">${day.date.split('(')[1].replace(')', '')}</span>
                                        <span class="text-2xl">${day.date.split('/')[1].split(' ')[0]}</span>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-[#2C4F3E] text-xl">${day.title}</h4>
                                        <p class="text-sm text-gray-500 mt-2">${day.summary}</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" class="text-gray-300 w-8 h-8"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (currentActiveTab === 'map') {
                html = `
                    <div class="animation-fade-in flex flex-col">
                        <h2 class="text-2xl font-bold text-[#2C4F3E] mb-4">地圖與推薦餐廳</h2>
                        <div class="flex gap-3 overflow-x-auto mb-6 scrollbar-hide py-2" id="map-day-selector">
                            ${itineraryData.map((day, idx) => `
                                <button onclick="loadMapDay(${idx})" id="map-btn-${idx}" class="shrink-0 px-5 py-3 rounded-xl whitespace-nowrap text-base font-bold bg-white border border-gray-200 text-gray-600 transition-all">
                                    第 ${idx + 1} 天
                                </button>
                            `).join('')}
                        </div>
                        <div id="map-view" class="w-full h-[60vh] rounded-3xl z-0 shadow-lg border border-gray-200"></div>
                        
                        <div class="mt-6 p-6 bg-white rounded-3xl shadow-sm border border-gray-200">
                            <h3 class="text-xl font-bold text-[#2C4F3E] mb-4 flex items-center gap-2"><i data-lucide="info" class="w-6 h-6 text-[#C8A165]"></i> 地圖圖例</h3>
                            <div class="flex gap-6">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full bg-[#2C4F3E] flex items-center justify-center text-white text-xs font-bold">景</div>
                                    <span class="text-lg text-gray-600 font-bold">行程景點</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full bg-[#C8A165] flex items-center justify-center text-white text-xs font-bold">食</div>
                                    <span class="text-lg text-gray-600 font-bold">推薦餐廳</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                setTimeout(() => loadMapDay(0), 100);
            } else if (currentActiveTab === 'disney-move-guide') {
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <div class="bg-[#2C4F3E] text-white p-8 rounded-3xl">
                            <h2 class="text-3xl font-bold flex items-center gap-3"><i data-lucide="footprints" class="w-8 h-8 text-[#C8A165]"></i> 園區移動策略</h2>
                            <p class="text-base text-gray-300 mt-2">針對長輩與幼童優化的專屬動線</p>
                        </div>
                        
                        <!-- 迪士尼陸地 (Land) -->
                        <div class="bg-white rounded-3xl p-6 shadow-sm border-l-8 border-[#3B82F6]">
                            <h3 class="text-2xl font-bold text-[#3B82F6] mb-4 flex items-center gap-2">🎢 陸地 Land：節省體力法</h3>
                            
                            <div class="space-y-4">
                                <div class="bg-blue-50 p-4 rounded-xl">
                                    <h4 class="text-lg font-bold text-blue-800 mb-2 flex items-center gap-2">① 九點入園</h4>
                                    <p class="text-gray-700 font-medium">專攻右側「明日樂園」。利用 VP 券玩維尼，省去長排隊。</p>
                                </div>
                                <div class="bg-blue-50 p-4 rounded-xl">
                                    <h4 class="text-lg font-bold text-blue-800 mb-2 flex items-center gap-2">② 午後移動</h4>
                                    <p class="text-gray-700 font-medium">慢慢散步至城堡左側看秀。下午 3 點再回頭玩美女與野獸 (VP通關)。</p>
                                </div>
                                <div class="bg-blue-50 p-4 rounded-xl">
                                    <h4 class="text-lg font-bold text-blue-800 mb-2 flex items-center gap-2">③ 遊行位置</h4>
                                    <p class="text-gray-700 font-medium">18:30 電子大遊行，VP 專屬席在城堡正前方或小城廣場，15 分鐘前抵達即可。</p>
                                </div>
                            </div>
                        </div>

                        <!-- 迪士尼海洋 (Sea) -->
                        <div class="bg-white rounded-3xl p-6 shadow-sm border-l-8 border-[#0EA5E9]">
                            <h3 class="text-2xl font-bold text-[#0EA5E9] mb-4 flex items-center gap-2">🌋 海洋 Sea：新園區核心法</h3>
                            
                            <div class="space-y-4">
                                <div class="bg-sky-50 p-4 rounded-xl">
                                    <h4 class="text-lg font-bold text-sky-800 mb-2 flex items-center gap-2">① 新園區特權</h4>
                                    <p class="text-gray-700 font-medium">飯店專屬入口直接進入「夢幻泉鄉」。早上主攻此區。</p>
                                </div>
                                <div class="bg-sky-50 p-4 rounded-xl">
                                    <h4 class="text-lg font-bold text-sky-800 mb-2 flex items-center gap-2">② 下午休整</h4>
                                    <p class="text-gray-700 font-medium">FS 離飯店極近，14:30 建議長輩小孩回房小憩。16:00 再出發。</p>
                                </div>
                                <div class="bg-sky-50 p-4 rounded-xl">
                                    <h4 class="text-lg font-bold text-sky-800 mb-2 flex items-center gap-2">③ 高效橫跨</h4>
                                    <p class="text-gray-700 font-medium">從深處 (FS/失去河) 到大門口，請務必搭乘「渡輪」，省下 15 分鐘步行路程。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentActiveTab === 'disney-guide') {
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <div class="bg-[#2C4F3E] text-white p-8 rounded-3xl">
                            <h2 class="text-3xl font-bold flex flex-col gap-2">
                                <i data-lucide="castle" class="w-8 h-8 text-[#C8A165]"></i>

        function createIcon(type) {
            const isSpot = type === 'spot';
            return L.divIcon({
                className: 'custom-marker',
                html: `<div class='pin ${isSpot ? 'pin-spot' : 'pin-food'}'></div><div class='pin-text'>${isSpot ? '景' : '食'}</div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -36]
            });
        }

        function loadMapDay(dayIdx) {
            if (!itineraryData[dayIdx]) return;
            const data = itineraryData[dayIdx];
            
            // 更新按鈕樣式
            document.querySelectorAll('button[id^="map-btn-"]').forEach(btn => {
                btn.classList.remove('bg-[#2C4F3E]', 'text-white', 'border-transparent');
                btn.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
            });
            const activeBtn = document.getElementById(`map-btn-${dayIdx}`);
            if(activeBtn) {
                activeBtn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
                activeBtn.classList.add('bg-[#2C4F3E]', 'text-white', 'border-transparent');
            }

            if (!mapInstance) {
                mapInstance = L.map('map-view');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(mapInstance);
            } else {
                // 清除現有標記
                mapInstance.eachLayer((layer) => {
                    if (layer instanceof L.Marker) {
                        mapInstance.removeLayer(layer);
                    }
                });
            }

            const bounds = L.latLngBounds();
            let hasValidPoints = false;

            // 標記景點
            if (data.events && Array.isArray(data.events)) {
                data.events.forEach(event => {
                    if (event.lat && event.lng) {
                        const marker = L.marker([event.lat, event.lng], { icon: createIcon('spot') }).addTo(mapInstance);
                        marker.bindPopup(`<div class="text-lg font-bold text-[#2C4F3E] p-1">${event.title}</div><div class="text-sm text-gray-600 px-1 pb-1">${event.loc}</div>`);
                        bounds.extend([event.lat, event.lng]);
                        hasValidPoints = true;
                    }
                });
            }

            // 標記餐廳
            if (data.restaurants && Array.isArray(data.restaurants)) {
                data.restaurants.forEach(rest => {
                    if (rest.lat && rest.lng) {
                        const marker = L.marker([rest.lat, rest.lng], { icon: createIcon('food') }).addTo(mapInstance);
                        marker.bindPopup(`<div class="text-lg font-bold text-[#C8A165] p-1">${rest.name}</div><div class="text-sm text-gray-600 px-1 pb-1">${rest.desc}</div>`);
                        bounds.extend([rest.lat, rest.lng]);
                        hasValidPoints = true;
                    }
                });
            }

            if (hasValidPoints && bounds.isValid()) {
                mapInstance.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
            } else if (mapInstance) {
                // 預設位置 (東京車站)
                mapInstance.setView([35.6812, 139.7671], 11);
            }
        }

        function updateFamilyStatus() {
            const now = new Date();
            // 由於測試環境時間不確定，此處模擬為旅程中某個時間點以展示功能
            // 實務上會使用真實時間比對行程
            const mockNow = new Date('2026-06-04T10:30:00'); // 模擬在 6/4 早上
            
            const startDate = new Date('2026-06-03T00:00:00');
            const endDate = new Date('2026-06-08T23:59:59');

            const statusTextEl = document.getElementById('status-text');
            const statusTimeEl = document.getElementById('status-time');
            const statusIconEl = document.getElementById('status-icon');

            // 確保元素存在
            if (!statusTextEl || !statusTimeEl || !statusIconEl) return;

            // 格式化目前時間顯示
            const timeString = `${mockNow.getMonth() + 1}/${mockNow.getDate()} ${String(mockNow.getHours()).padStart(2, '0')}:${String(mockNow.getMinutes()).padStart(2, '0')}`;
            statusTimeEl.innerText = `Status • ${timeString}`;

            if (mockNow < startDate) {
                statusTextEl.innerText = "期待出發中";
                statusIconEl.setAttribute('data-lucide', 'calendar');
                statusIconEl.classList.replace('text-[#C8A165]', 'text-[#3B82F6]');
            } else if (mockNow > endDate) {
                statusTextEl.innerText = "旅途平安結束";
                statusIconEl.setAttribute('data-lucide', 'home');
                statusIconEl.classList.replace('text-[#C8A165]', 'text-[#2C4F3E]');
            } else {
                // 簡易邏輯判斷當下狀態
                const day = mockNow.getDate() - 3; // 0=6/3, 1=6/4...
                const hour = mockNow.getHours();
                
                if (day === 0 && hour < 14) {
                    statusTextEl.innerText = "準備搭機前往東京";
                    statusIconEl.setAttribute('data-lucide', 'plane');
                } else if (day === 0 && hour >= 14 && hour < 16) {
                    statusTextEl.innerText = "包車前往飯店中";
                    statusIconEl.setAttribute('data-lucide', 'car');
                } else if (day === 5 && hour >= 13) {
                    statusTextEl.innerText = "前往機場準備賦歸";
                    statusIconEl.setAttribute('data-lucide', 'plane');
                } else if (hour >= 21 || hour < 7) {
                    statusTextEl.innerText = "飯店休息中";
                    statusIconEl.setAttribute('data-lucide', 'moon');
                } else {
                    // 根據日期顯示不同樂園/景點狀態
                    if (day === 1) {
                        statusTextEl.innerText = "迪士尼樂園攻略中";
                        statusIconEl.setAttribute('data-lucide', 'castle');
                    } else if (day === 2) {
                        statusTextEl.innerText = "迪士尼海洋暢玩中";
                        statusIconEl.setAttribute('data-lucide', 'waves');
                    } else if (day === 3) {
                        if (hour < 14) statusTextEl.innerText = "海洋最後巡禮中";
                        else statusTextEl.innerText = "淺草觀光中";
                        statusIconEl.setAttribute('data-lucide', 'camera');
                    } else if (day === 4) {
                        statusTextEl.innerText = "東京地標巡禮中";
                        statusIconEl.setAttribute('data-lucide', 'map-pin');
                    } else {
                        statusTextEl.innerText = "快樂旅途中";
                        statusIconEl.setAttribute('data-lucide', 'heart');
                    }
                }
            }
            
            // 重新初始化圖示
            lucide.createIcons();
        }

        window.onload = () => {
            renderNav();
            renderContent();
            updateFamilyStatus();
            
            // 每分鐘更新一次狀態
            setInterval(updateFamilyStatus, 60000);
            
            lucide.createIcons();
        };

    </script>
</body>
</html>
