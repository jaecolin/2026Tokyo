        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInBottom {
            from { transform: translateY(32px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animation-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .animation-slide-in-bottom {
            animation: slideInBottom 0.5s ease-out forwards;
        }

        .custom-marker {
            background: transparent;
            border: none;
        }
        .pin {
            width: 36px;
            height: 36px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -18px 0 0 -18px;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }
        .pin-spot { background: #2C4F3E; }
        .pin-food { background: #C8A165; }
        .pin-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        .vp-badge {
            background: #D32F2F;
            color: white;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 900;
            margin-left: 6px;
        }
    </style>

                { id: 'pre-check', label: '行前清單' },
                { id: 'return-check', label: '回程清單' }
            ];

            const navHtml = tabs.map(tab => {
                const isActive = currentActiveTab === tab.id || (tab.id === 'overview' && currentActiveTab.startsWith('day-'));
                const activeClasses = isActive 
                    ? `bg-[#2C4F3E] text-white shadow-lg` 
                    : `bg-white text-gray-500 border border-gray-200`;
                
                return `<button onclick="setActiveTab('${tab.id}')" class="shrink-0 px-6 py-4 rounded-2xl whitespace-nowrap text-base font-black tracking-widest transition-all ${activeClasses}">${tab.label}</button>`;
            }).join('');

            document.getElementById('nav-container').innerHTML = navHtml;
        }

                                <li>● 陸地：美女與野獸、小熊維尼、小小世界</li>
                                <li>● 海洋：安娜冰雪、彼得潘、翱翔 (Soaring)</li>
                            </ul>
                        </div>
                    </div>
                `;
            } else if (currentActiveTab === 'disney-move') {
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <div class="bg-[#2C4F3E] text-white p-8 rounded-3xl">
                            <h2 class="text-3xl font-black flex items-center gap-3"><i data-lucide="map" class="w-8 h-8 text-[#C8A165]"></i> 園區移動策略</h2>
                            <p class="text-base text-gray-300 mt-2">極小化步行，極大化接駁價值</p>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-white p-6 rounded-3xl border border-gray-200">
                                <h3 class="text-xl font-black text-[#2C4F3E] mb-3">🎢 樂園 (Land) 攻略</h3>
                                <p class="text-gray-600 font-bold leading-relaxed">採取「順時針圓形移動」。早上從明日樂園開始，下午回卡通城。晚上看遊行座位就在世界市集門口，動線最短。</p>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-gray-200">
                                <h3 class="text-xl font-black text-[#2C4F3E] mb-3">🌋 海洋 (Sea) 攻略</h3>
                                <p class="text-gray-600 font-bold leading-relaxed">善用「渡輪」由北向南跨區，搭乘「高架電車」返回門口。住 FS 飯店房客請務必利用下午 14:30 回房小憩，這是避免長輩斷電的關鍵。</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentActiveTab === 'shopping') {
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <div class="bg-[#2C4F3E] text-white p-8 rounded-3xl">
                            <h2 class="text-3xl font-black flex items-center gap-3"><i data-lucide="shopping-bag" class="w-8 h-8 text-[#C8A165]"></i> 採購指南</h2>
                            <p class="text-base text-gray-300 mt-2">必買清單與客製化攻略</p>
                        </div>
                        <div class="grid grid-cols-1 gap-6 font-bold">
                             <div class="bg-white p-6 rounded-3xl border border-gray-200">
                                <h3 class="text-xl text-[#C8A165] mb-2">🎁 迪士尼必買</h3>
                                <p class="text-gray-600">客製化 Tomica、全家剪影、25週年藍美石紀念瓶、達菲最新公仔。</p>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-gray-200">
                                <h3 class="text-xl text-[#C8A165] mb-2">🍱 淺草名產</h3>
                                <p class="text-gray-600">人形燒、常盤堂雷米、淺草絲綢布丁。</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentActiveTab === 'pre-check') {
                const checks = ["假期套票券包 (實體紙本)","護照與 VJW QR Code","長輩常備藥與慢箋","舒適運動鞋 (兩雙替換)","連日單軌電車券 (Resort Line)"];
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <div class="bg-[#2C4F3E] text-white p-8 rounded-3xl">
                            <h2 class="text-3xl font-black flex items-center gap-3"><i data-lucide="check-square" class="w-8 h-8 text-[#C8A165]"></i> 行前必備</h2>
                        </div>
                        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-200 space-y-4">
                            ${checks.map(item => `
                                <label class="flex items-center gap-5 p-4 border-b border-gray-100 last:border-0">
                                    <input type="checkbox" class="w-6 h-6 rounded text-[#2C4F3E]" />
                                    <span class="text-xl text-gray-700 font-bold">${item}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (currentActiveTab === 'return-check') {
                const checks = ["飯店退房確認 (Safe Box)","免稅收據收集","利木津巴士/包車確認","行李是否超重 (23kg x 2)"];
                html = `
                    <div class="space-y-6 animation-fade-in">
                        <div class="bg-[#2C4F3E] text-white p-8 rounded-3xl">
                            <h2 class="text-3xl font-black flex items-center gap-3"><i data-lucide="plane-takeoff" class="w-8 h-8 text-[#C8A165]"></i> 賦歸檢查</h2>
                        </div>
                        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-200 space-y-4">
                            ${checks.map(item => `
                                <label class="flex items-center gap-5 p-4 border-b border-gray-100 last:border-0">
                                    <input type="checkbox" class="w-6 h-6 rounded text-[#2C4F3E]" />
                                    <span class="text-xl text-gray-700 font-bold">${item}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (currentActiveTab.startsWith('day-')) {
                const dayIdx = parseInt(currentActiveTab.split('-')[1]);
                const day = itineraryData[dayIdx];
                html = `
                    <div class="space-y-8 animation-slide-in-bottom pb-10">
                        <div class="flex flex-col gap-4 px-2">
                            <button onclick="setActiveTab('overview')" class="w-fit flex items-center gap-2 text-lg font-black text-[#C8A165] bg-white border border-[#C8A165] px-5 py-2 rounded-full transition-all active:bg-[#C8A165] active:text-white">
                                <i data-lucide="arrow-left" class="w-5 h-5"></i> 返回列表
                            </button>
                            <div>
                                <h2 class="text-4xl font-black text-[#2C4F3E] mt-2">${day.date}</h2>
                                <p class="text-xl text-gray-500 font-bold mt-2">${day.title}</p>
                            </div>
                        </div>

                        <div class="relative pl-10 space-y-10 before:content-[''] before:absolute before:left-[19px] before:top-4 before:bottom-4 before:w-[4px] before:bg-[#C8A165]/30">
                            ${day.events.map((event, i) => `
                                <div class="relative group cursor-pointer" onclick="openModal(${dayIdx}, ${i})">
                                    <div class="absolute -left-[45px] top-2 w-[24px] h-[24px] rounded-full border-4 border-white shadow-md bg-[#C8A165] z-10"></div>
                                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200 active:bg-gray-50 transition-colors">
                                        <div class="flex justify-between items-center mb-3">
                                            <span class="text-base font-black text-[#C8A165] flex items-center gap-2">
                                                <i data-lucide="clock" class="w-5 h-5"></i> ${event.time}
                                            </span>
                                            <span class="text-sm bg-[#F9F7F2] text-[#2C4F3E] px-3 py-1 rounded-lg font-bold">${event.loc}</span>
                                        </div>
                                        <h3 class="font-black text-[#2C4F3E] text-2xl mb-2 flex items-center">
                                            ${event.title}
                                            ${event.isVp ? '<span class="vp-badge">VP</span>' : ''}
                                        </h3>
                                        <p class="text-lg text-gray-600 font-bold leading-relaxed">${event.detail}</p>
                                        <div class="mt-5 flex items-center gap-2 text-sm text-[#2C4F3E] bg-[#F9F7F2] px-4 py-3 rounded-xl w-fit font-black">
                                            <i data-lucide="truck" class="w-5 h-5 text-[#C8A165]"></i> 
                                            <span>${event.trans}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            lucide.createIcons();
        }

        function createIcon(type) {
            return L.divIcon({
                className: 'custom-marker',
                html: `<div class='pin ${type === 'spot' ? 'pin-spot' : 'pin-food'}'></div><div class='pin-text'>${type === 'spot' ? '景' : '食'}</div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -36]
            });
        }

        function loadMapDay(dayIdx) {
            const data = itineraryData[dayIdx];
            if (!data) return;
            
            document.querySelectorAll('button[id^="map-btn-"]').forEach(btn => {
                btn.className = "shrink-0 px-5 py-3 rounded-xl whitespace-nowrap text-base font-bold bg-white border border-gray-200 text-gray-600 transition-all";
            });
            const activeBtn = document.getElementById(`map-btn-${dayIdx}`);
            if(activeBtn) activeBtn.className = "shrink-0 px-5 py-3 rounded-xl whitespace-nowrap text-base font-bold bg-[#2C4F3E] text-white border-transparent transition-all shadow-md";

            if (!mapInstance) {
                mapInstance = L.map('map-view').setView([35.6329, 139.8804], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
            } else {
                mapInstance.eachLayer((layer) => { if (layer instanceof L.Marker) mapInstance.removeLayer(layer); });
            }

            const bounds = [];
            data.events.forEach(e => {
                if (e.lat) {
                    L.marker([e.lat, e.lng], { icon: createIcon('spot') }).addTo(mapInstance).bindPopup(`<b class="text-lg">${e.title}</b><p>${e.detail}</p>`);
                    bounds.push([e.lat, e.lng]);
                }
            });
            if (data.restaurants) data.restaurants.forEach(r => {
                L.marker([r.lat, r.lng], { icon: createIcon('food') }).addTo(mapInstance).bindPopup(`<b class="text-lg">${r.name}</b><p>${r.desc}</p>`);
                bounds.push([r.lat, r.lng]);
            });

            if (bounds.length > 0) mapInstance.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
        }

        function setActiveTab(tabId) {
            currentActiveTab = tabId;
            renderNav();
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(dayIdx, eventIdx) {
            const event = itineraryData[dayIdx].events[eventIdx];
            const modalContainer = document.getElementById('modal-container');
            modalContainer.innerHTML = `
                <div class="bg-white rounded-[40px] w-full max-w-sm overflow-hidden shadow-2xl relative">
                    <div class="bg-[#2C4F3E] p-10 text-white">
                        <button onclick="closeModal()" class="absolute top-6 right-6 bg-white/20 p-3 rounded-full leading-none">✕</button>
                        <span class="text-sm font-black opacity-80 uppercase flex items-center gap-2 mb-2"><i data-lucide="map-pin" class="w-5 h-5"></i> ${event.loc}</span>
                        <h2 class="text-3xl font-black mt-1 leading-tight">${event.title}</h2>
                    </div>
                    <div class="p-10 space-y-8">
                        <div>
                            <h4 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-3">行程重點</h4>
                            <p class="text-xl text-gray-700 leading-relaxed font-black">${event.detail}</p>
                        </div>
                        <div class="pt-6 border-t border-gray-100">
                            <div class="flex items-center gap-3 text-lg font-black text-[#C8A165] mb-3">
                                <i data-lucide="truck" class="w-6 h-6"></i> 移動指南
                            </div>
                            <div class="p-5 bg-[#F9F7F2] rounded-2xl text-lg font-black text-[#2C4F3E]">
                                交通方式：${event.trans}
                            </div>
                        </div>
                        <button onclick="closeModal()" class="w-full bg-[#2C4F3E] text-white py-5 rounded-3xl font-black text-xl tracking-widest shadow-xl">關閉詳情</button>
                    </div>
                </div>
            `;
            modalContainer.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function updateFamilyStatus() {
            const mockNow = new Date('2026-06-04T10:30:00'); // 模擬時間點
            const statusTextEl = document.getElementById('status-text');
            const statusTimeEl = document.getElementById('status-time');
            const statusIconEl = document.getElementById('status-icon');

            if (!statusTextEl) return;
            statusTimeEl.innerText = `Status • 06/04 10:30`;
            statusTextEl.innerText = "迪士尼樂園攻略中";
            statusIconEl.setAttribute('data-lucide', 'castle');
            lucide.createIcons();
        }

        window.onload = () => {
            renderNav();
            renderContent();
            updateFamilyStatus();
        };
    </script>
</body>
</html>
